<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CubynSMP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- Admin Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <img src="logo.png" alt="CubynSMP Logo" class="login-logo">
            <h2 class="login-title">Admin Login</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>
            <p class="login-hint">Default: admin123</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard" style="display: none;">
        <!-- Admin Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="logo.png" alt="CubynSMP Logo" class="sidebar-logo">
                <span class="sidebar-brand">Admin Panel</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#server" class="sidebar-link active" data-section="server">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
                    Server Info
                </a>
                <a href="#ranks" class="sidebar-link" data-section="ranks">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Ranks
                </a>
                <a href="#discord" class="sidebar-link" data-section="discord">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                    Discord
                </a>
                <a href="#hero" class="sidebar-link" data-section="hero">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Hero Section
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Back to Website
                </a>
                <button id="logoutBtn" class="sidebar-link logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Admin Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-title">Dashboard</h1>
                <div class="admin-actions">
                    <button id="saveAllBtn" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Save Changes
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <!-- Server Info Section -->
                <section id="serverSection" class="admin-section active">
                    <div class="section-card">
                        <h2 class="section-card-title">Server Information</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="serverName">Server Name</label>
                                <input type="text" id="serverName" placeholder="Enter server name">
                            </div>
                            <div class="form-group">
                                <label for="serverIp">Server IP</label>
                                <input type="text" id="serverIp" placeholder="Enter server IP">
                            </div>
                            <div class="form-group">
                                <label for="serverPort">Server Port</label>
                                <input type="text" id="serverPort" placeholder="Enter server port">
                            </div>
                            <div class="form-group form-group-full">
                                <label for="serverDescription">Server Description</label>
                                <textarea id="serverDescription" rows="4" placeholder="Enter server description"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="section-card">
                        <h2 class="section-card-title">Server Features</h2>
                        <div id="featuresList" class="features-list">
                            <!-- Features will be loaded dynamically -->
                        </div>
                        <button id="addFeatureBtn" class="btn btn-secondary btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Add Feature
                        </button>
                    </div>
                </section>

                <!-- Ranks Section -->
                <section id="ranksSection" class="admin-section">
                    <div class="section-card">
                        <div class="section-card-header">
                            <h2 class="section-card-title">Manage Ranks</h2>
                            <button id="addRankBtn" class="btn btn-primary btn-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                Add Rank
                            </button>
                        </div>
                        <div id="ranksList" class="admin-ranks-list">
                            <!-- Ranks will be loaded dynamically -->
                        </div>
                    </div>
                </section>

                <!-- Discord Section -->
                <section id="discordSection" class="admin-section">
                    <div class="section-card">
                        <h2 class="section-card-title">Discord Integration</h2>
                        <div class="form-grid">
                            <div class="form-group form-group-full">
                                <label for="discordLink">Discord Server Link</label>
                                <input type="url" id="discordLink" placeholder="https://discord.gg/...">
                                <p class="form-hint">This link will be used for all Discord buttons on the website.</p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Hero Section -->
                <section id="heroSection" class="admin-section">
                    <div class="section-card">
                        <h2 class="section-card-title">Hero Section</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="heroTitle">Hero Title</label>
                                <input type="text" id="heroTitle" placeholder="Enter hero title">
                            </div>
                            <div class="form-group form-group-full">
                                <label for="heroTagline">Hero Tagline</label>
                                <input type="text" id="heroTagline" placeholder="Enter hero tagline">
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-content">
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
